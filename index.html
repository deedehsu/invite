<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文哲的新居落成邀請函</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { background-color: #000; margin: 0; overflow: hidden; }

      /* 邀請卡容器：負責控制縮放動畫 */
      #ui-container {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 9999;
        transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        transform-origin: bottom left;
      }

      /* 縮小狀態：變成一個精緻的小方塊/按鈕 */
      #ui-container.minimized {
        width: 60px;
        height: 60px;
        background: rgba(10, 25, 30, 0.9);
        border: 1px solid #00ced1;
        border-radius: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* 放大狀態：展開成完整的邀請卡 */
      #ui-container.expanded {
        bottom: 50%;
        left: 50%;
        transform: translate(-50%, 50%);
        width: 85%;
        max-width: 360px;
      }

      /* 邀請卡內容樣式 */
      #ui-overlay {
        padding: 30px 20px;
        background: rgba(10, 25, 30, 0.85);
        color: #e0f7fa;
        text-align: center;
        border-radius: 20px;
        border: 1px solid #00ced1;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
        font-family: "Microsoft JhengHei", sans-serif;
        display: none; /* 預設隱藏內容 */
        position: relative;
      }

      #ui-container.expanded #ui-overlay { display: block; }
      #ui-container.minimized::before { content: "✉"; font-size: 24px; color: #00ced1; }

      /* 關閉按鈕 */
      .close-btn {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 20px;
        color: #88aaaa;
        cursor: pointer;
      }

      h1 { color: #00ced1; font-size: 1.4rem; margin-top: 0; }
      .info { font-size: 1rem; margin: 10px 0; }
      .quote { font-size: 0.85rem; color: #88aaaa; font-style: italic; margin-top: 15px; line-height: 1.5; }

      /* 十字架裝飾 */
      .cross-deco {
        position: absolute;
        bottom: 10px;
        right: 15px;
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #00ced1 0%, #008b8b 100%);
        -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M45 10 h10 v30 h30 v10 h-30 v40 h-10 v-40 h-30 v-10 h30 z' fill='black'/></svg>");
        mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M45 10 h10 v30 h30 v10 h-30 v40 h-10 v-40 h-30 v-10 h30 z' fill='black'/></svg>");
        mask-size: contain; mask-repeat: no-repeat; opacity: 0.5; z-index: -1;
      }
    </style>
  </head>
  <body>

    <div id="ui-container" class="minimized" onclick="toggleInvite(event)">
      <div class="cross-deco"></div>
      <div id="ui-overlay">
        <span class="close-btn" onclick="toggleInvite(event)">×</span>
        <h1>新居落成 誠摯邀請</h1>
        <div style="border-top: 1px solid #00ced1; width: 40px; margin: 0 auto 15px;"></div>
        <p class="info"><strong>主邀人：文哲</strong></p>
        <p class="info">115年5月16日 下午15:00</p>
        <p class="info" style="font-size: 0.9rem;">高雄市鼓山區中華一路29巷</p>
        <p class="quote">〈 請帶著你們的祝福來<br>願你們的祝福<br>成為我們的房角石 〉</p>
        <div class="cross-deco"></div>
      </div>
    </div>

    <a-scene vr-mode-ui="enabled: false">
      <a-assets><img id="panorama" src="bg.jpg"></a-assets>
      <a-sky src="#panorama" rotation="0 -90 0" phi-length="360" theta-length="45" theta-start="68" radius="15" material="repeat: 2 1;"></a-sky>
      <a-entity id="rig"><a-entity id="myCamera" camera="fov: 45;" look-controls></a-entity></a-entity>
    </a-scene>

    <script>
      function toggleInvite(e) {
        e.stopPropagation();
        const container = document.getElementById('ui-container');
        if (container.classList.contains('minimized')) {
          container.classList.remove('minimized');
          container.classList.add('expanded');
        } else if (e.target.classList.contains('close-btn')) {
          container.classList.remove('expanded');
          container.classList.add('minimized');
        }
      }

      AFRAME.registerComponent('lock-vertical', {
        tick: function () {
          var rotation = this.el.getAttribute('rotation');
          if (rotation.x !== 0) this.el.setAttribute('rotation', {x: 0, y: rotation.y, z: 0});
        }
      });
      document.querySelector('#myCamera').setAttribute('lock-vertical', '');
    </script>
  </body>
</html>
